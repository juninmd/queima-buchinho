version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: queima-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: queima_buchinho
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d queima_buchinho"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: queima-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: queima-bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/queima_buchinho
      - REDIS_URL=redis://redis:6379
      - BOT_MODE=listener
      - WEBHOOK_URL= # Deixa vazio localmente pra usar Polling
      - PORT=3000
      - HEALTH_PORT=8080
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - ./assets:/app/assets
      - ./data:/app/data
