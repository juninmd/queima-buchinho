apiVersion: apps/v1
kind: Deployment
metadata:
  name: queima-buchinho-listener
  namespace: automation
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: queima-buchinho
      mode: listener
  template:
    metadata:
      labels:
        app: queima-buchinho
        mode: listener
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
      - name: ghcr-pull-secret
      initContainers:
      - name: migrate
        image: ghcr.io/juninmd/queima-buchinho:latest
        imagePullPolicy: Always
        command: ["pnpm", "run", "migrate"]
        envFrom:
        - secretRef:
            name: queima-buchinho-secret
      containers:
      - name: queima-buchinho
        image: ghcr.io/juninmd/queima-buchinho:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: webhook
        - containerPort: 8080
          name: health
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        env:
        - name: BOT_MODE
          value: listener
        - name: PORT
          value: "3000"
        - name: OLLAMA_HOST
          value: "http://ollama.ai.svc.cluster.local:11434"
        envFrom:
        - secretRef:
            name: queima-buchinho-secret
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
