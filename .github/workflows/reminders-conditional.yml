name: Conditional Reminders (Did you train?)

on:
  schedule:
    # 15:00 UTC = 12:00 BRT (UTC-3)
    # 21:00 UTC = 18:00 BRT (UTC-3)
    # Ter (2), Qua (3), Qui (4), Sex (5), Sáb (6), Dom (0)
    - cron: '0 15,21 * * 0,2,3,4,5,6'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  run-conditional-reminder:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Run Conditional Reminder
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        BOT_MODE: reminder_conditional
      run: npm start
