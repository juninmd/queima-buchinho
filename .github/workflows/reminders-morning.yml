name: Morning Reminders (Cardio & Pre-workout)

on:
  schedule:
    # 09:30 UTC = 06:30 BRT (UTC-3)
    # Seg (1), Qua (3), Sex (5), Sáb (6), Dom (0)
    - cron: '30 9 * * 0,1,3,5,6'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  run-morning-reminder:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Run Morning Reminder
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        BOT_MODE: reminder_morning
      run: npm start
